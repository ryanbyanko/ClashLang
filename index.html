<!DOCTYPE html>
<html>
  <head>
    <title>ClashLang Editor</title>
    <script src="transpiler.js"></script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      #container {
        display: flex;
        gap: 20px;
        height: 80%;
      }
      .box {
        flex: 1;
        background-color: lightgray;
        padding: 20px;
      }
      #code {
        width: 100%;
        height: 100%;
        font-family: monospace;
        color: lightgreen;
        background-color: black;
      }
      #console {
        width: 100%;
        height: 100%;
        font-family: monospace;
        color: lightgreen;
        background-color: black;
      }
    </style>
  </head>
  <body>
    <h1>ClashLang Editor</h1>
    <div id="container">
      <div class="box">
        <p>Code <button onclick="run()">Run</button></p>
        <textarea id="code">
// A lovely ClashLang program to greet the user!


// First we need a deck that will print lines of text
giant beatdown deck with miner
    predict skarmy, cycle miner
        giant kites skarmy
        spam giant, emote
        buff skarmy, nerf miner
    gg
ez

// Now we're ready for introductions!
join clan
chat Hello from ClashLang! What's your name?
bomber defends golem
spam bomber
xbow ignores sparky, marcher defends xbow
run giant beatdown with marcher

// Now lets spectate what the user has to say
save elixir, spectate
elixir for fireball

// Now we can form our response from the pieces we got!
leak elixir
run giant beatdown with sparky, save elixir
run giant beatdown with fireball, leak elixir

emote

        </textarea>
      </div>
      <div class="box">
        <p>Result:</p>
        <pre id="console"></pre>
      </div>
    </div>

    <script>
const EXTENSIONS = `
let process = {};
process.stdout = {};
process.stdout.write = (str) => document.getElementById("console").innerHTML += str;
prompt = prompt;`;

function run() {
  document.getElementById("console").innerHTML = "";
  let code = document.getElementById("code").value;
  let js = transpile(code, EXTENSIONS);
  eval(js);
}
    </script>

  </body>
</html>
